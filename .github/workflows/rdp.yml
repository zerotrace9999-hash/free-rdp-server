name: RDP

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable RDP and Create User
        run: |
          # 1. إنشاء حساب المسؤول
          net user kamel123 MyStrong123 /add
          net localgroup administrators kamel123 /add
          
          # 2. تفعيل خدمة سطح المكتب عن بعد وفتح جدار الحماية
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Start Tunnel via Localtunnel
        run: |
          # 1. تثبيت أداة localtunnel عبر npm المدمج في السيرفر
          npm install -g localtunnel
          
          # 2. تشغيل النفق وتحويل المنفذ 3389
          lt --port 3389
